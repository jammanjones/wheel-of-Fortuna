<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lady Fortuna</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <header>

        <h1>⚜ Lady Fortuna ⚜</h1>

        <p class="subtitle">
            Let Fortune Guide Your Next Move
        </p>

    </header>

    <main>

        <div class="wheel-wrapper">

            <div class="pointer"></div>

            <canvas
                id="wheel"
                width="600"
                height="600">
            </canvas>

        </div>

        <button id="spinButton">
            Seek Fortuna's Judgment
        </button>

        <div id="result" class="result">

            Lady Fortuna awaits your question...

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
