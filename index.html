<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lady Fortuna</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>⚜ Lady Fortuna ⚜</h1>

<p class="subtitle">
Let Fortune Guide Your Next Move
</p>

<div class="wheel-container">

<div class="pointer"></div>

<div class="wheel-container">

    <div class="pointer">▼</div>

    <svg id="wheel" class="wheel" viewBox="0 0 500 500">

        <circle 
        cx="250" 
        cy="250" 
        r="240"
        fill="#111"
        stroke="#d4af37"
        stroke-width="10"/>

    </svg>

</div>

</div>

<button id="spinButton">
Seek Fortuna's Judgment
</button>

<div id="result" class="result">

The Wheel Awaits...

</div>

</div>

<script src="script.js"></script>

</body>
</html>
